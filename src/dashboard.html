:root{
  --green:#4A5D3D;--green-ink:#37472E;--terracotta:#9C6355;--terracotta-deep:#7F4F44;
  --paper:#fff;--paper-2:#F5F3EF;--paper-line:#E4E0D6;--ink:#1B1B18;
  --font-body:'Roboto',system-ui,sans-serif;--font-display:'TrashHand','Segoe Print',cursive;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--paper-2);color:var(--ink);line-height:1.5;font-size:15px}
.wrap{max-width:1100px;margin:0 auto;padding:0 20px}
h1,h2{font-family:var(--font-display);font-weight:400;color:var(--green-ink)}
header{background:var(--green);padding:1rem 0}
header .wrap{display:flex;align-items:center;justify-content:space-between}
header a{color:#fff;text-decoration:none;font-weight:700;font-size:.85rem}
header h1{color:#fff;font-size:1.6rem}
main{padding:1.6rem 0 3rem}

#lockScreen{max-width:360px;margin:4rem auto;background:#fff;border:1px solid var(--paper-line);border-radius:8px;padding:1.6rem;text-align:center}
#lockScreen input{width:100%;padding:.6rem .7rem;border:1px solid var(--paper-line);border-radius:6px;font:inherit;margin:.8rem 0}
#lockScreen button{width:100%;background:var(--terracotta);color:#fff;border:none;border-radius:6px;padding:.7rem;font-weight:800;cursor:pointer}
#lockScreen button:hover{background:var(--terracotta-deep)}
#lockFout{color:#8a2b1e;font-size:.85rem;min-height:1.2em;margin-top:.4rem}

.kaarten{display:grid;gap:.8rem;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-bottom:1.6rem}
.kaart{background:#fff;border:1px solid var(--paper-line);border-radius:8px;padding:1rem 1.1rem}
.kaart .label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#8a8a80}
.kaart .waarde{font-family:var(--font-display);font-size:1.7rem;color:var(--green-ink);margin-top:.2rem}

table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--paper-line);border-radius:8px;overflow:hidden}
th,td{text-align:left;padding:.6rem .8rem;font-size:.85rem;border-bottom:1px solid var(--paper-line)}
th{background:var(--paper-2);font-weight:800;color:var(--green-ink);font-size:.72rem;text-transform:uppercase;letter-spacing:.03em}
tr:last-child td{border-bottom:none}
.top-producten{font-size:.78rem;color:#6b6a62}
.opmerking{font-size:.8rem;color:#6b6a62;margin-top:1.2rem;background:#fff;border-left:3px solid var(--terracotta);padding:.7rem .9rem;border-radius:0 6px 6px 0}
.leeg{color:#8a8a80;font-size:.9rem;padding:1rem}
</style>
</head>
<body>

<div id="lockScreen">
  <h1 style="font-size:1.3rem;margin-bottom:.3rem">Marketingdashboard</h1>
  <p style="font-size:.85rem;color:#6b6a62">Alleen voor Maikel — voer het wachtwoord in.</p>
  <input type="password" id="wachtwoordInput" placeholder="Wachtwoord" autocomplete="off">
  <button type="button" id="ontgrendelBtn">Bekijken</button>
  <div id="lockFout"></div>
</div>

<div id="dashboardScherm" style="display:none">
  <header>
    <div class="wrap">
      <h1>Marketingdashboard</h1>
      <a href="/bestellen">&larr; Naar de bestelsite</a>
    </div>
  </header>
  <main>
    <div class="wrap">
      <div class="kaarten" id="algemeenKaarten"></div>
      <h2 style="font-size:1.3rem;margin-bottom:.6rem">Per actie</h2>
      <div id="actiesTabel"></div>
      <div class="opmerking" id="opmerkingTekst"></div>
    </div>
  </main>
</div>

<script>
(function(){
  var wachtwoordInput = document.getElementById('wachtwoordInput');
  var ontgrendelBtn = document.getElementById('ontgrendelBtn');
  var lockFout = document.getElementById('lockFout');

  function euro(n){ return '€' + (n||0).toFixed(2).replace('.', ','); }

  function laadDashboard(wachtwoord){
    lockFout.textContent = 'Laden...';
    fetch('/api/dashboard-data?wachtwoord=' + encodeURIComponent(wachtwoord))
      .then(function(res){ return res.json().then(function(data){ return {ok:res.ok, data:data}; }); })
      .then(function(result){
        if(!result.ok){
          lockFout.textContent = (result.data && result.data.error) || 'Kon dashboard niet laden.';
          return;
        }
        try { sessionStorage.setItem('bd_dash_pw', wachtwoord); } catch(e){}
        toonDashboard(result.data);
      })
      .catch(function(){ lockFout.textContent = 'Kon geen verbinding maken.'; });
  }

  function toonDashboard(data){
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('dashboardScherm').style.display = 'block';

    var a = data.algemeen;
    var kaarten = document.getElementById('algemeenKaarten');
    kaarten.innerHTML =
      kaart('Betaalde bestellingen', a.aantalBestellingen) +
      kaart('Totale omzet', euro(a.totaleOmzet)) +
      kaart('Gem. bestelwaarde', euro(a.gemiddeldeBestelwaarde)) +
      kaart('Unieke klanten', a.uniekeKlanten) +
      kaart('Nieuwe klanten', a.nieuweKlanten) +
      kaart('Terugkerende klanten', a.terugkerendeKlanten);

    var tabelHost = document.getElementById('actiesTabel');
    if (!data.acties.length) {
      tabelHost.innerHTML = '<p class="leeg">Nog geen acties gebruikt in betaalde bestellingen.</p>';
    } else {
      var rows = data.acties.map(function(actie){
        var top = actie.topProducten.map(function(p){ return p.naam + ' (' + p.aantal + 'x)'; }).join(', ');
        return '<tr>' +
          '<td><strong>' + actie.naam + '</strong></td>' +
          '<td>' + actie.aantalGebruikt + '</td>' +
          '<td>' + euro(actie.omzet) + '</td>' +
          '<td>' + euro(actie.gemiddeldeBestelwaarde) + '</td>' +
          '<td>' + euro(actie.extraOmzetSchatting) + '</td>' +
          '<td>' + actie.nieuweKlanten + ' nieuw / ' + actie.terugkerendeKlanten + ' terug</td>' +
          '<td class="top-producten">' + (top || '-') + '</td>' +
        '</tr>';
      }).join('');
      tabelHost.innerHTML =
        '<table><thead><tr>' +
        '<th>Actie</th><th>Gebruikt</th><th>Omzet</th><th>Gem. bestelwaarde</th><th>Extra omzet (schatting)</th><th>Nieuw/terug</th><th>Topproducten</th>' +
        '</tr></thead><tbody>' + rows + '</tbody></table>';
    }

    document.getElementById('opmerkingTekst').textContent = data.opmerking || '';
  }

  function kaart(label, waarde){
    return '<div class="kaart"><div class="label">' + label + '</div><div class="waarde">' + waarde + '</div></div>';
  }

  ontgrendelBtn.addEventListener('click', function(){
    var wachtwoord = wachtwoordInput.value.trim();
    if(!wachtwoord) return;
    laadDashboard(wachtwoord);
  });
  wachtwoordInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter') ontgrendelBtn.click();
  });

  // sessie-gemak: als dit tabblad het wachtwoord al eerder heeft geverifieerd, niet opnieuw vragen
  try {
    var onthouden = sessionStorage.getItem('bd_dash_pw');
    if (onthouden) laadDashboard(onthouden);
  } catch(e){}
})();
</script>

</body>
</html>
